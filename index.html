<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Shortcut Pro - Pointcore.id</title>
    <style>
        /* VARIABEL WARNA */
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --excel-green: #217346;
            --pointcore-green: #43a047; /* Warna hijau senada logo */
            --border-color: #dfe6e9;
            --row-even: #f9f9f9;
            --row-hover: #e8f5e9;
            --badge-bg: #eef7f0;
            --badge-text: #1a5a37;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #b2bec3;
            --excel-green: #2ecc71;
            --border-color: #2d3436;
            --row-even: #252525;
            --row-hover: #2c3e50;
            --badge-bg: #1b3022;
            --badge-text: #a5d6a7;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
        }

        /* LOGO & HEADER */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-img {
            max-width: 120px; /* Ukuran logo */
            height: auto;
            margin-bottom: 10px;
        }

        .header-section h1 {
            color: var(--excel-green);
            margin: 5px 0;
            font-size: 26px;
        }

        .theme-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--excel-green);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        /* SEARCH AREA */
        .search-box {
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: var(--excel-green);
            box-shadow: 0 0 10px rgba(33, 115, 70, 0.1);
        }

        /* TABLE STYLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 15px;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        tbody tr:nth-child(even) {
            background-color: var(--row-even);
        }

        tbody tr:hover {
            background-color: var(--row-hover);
        }

        .shortcut-badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 5px 10px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-weight: bold;
            font-size: 13px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* FOOTER */
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        footer b {
            color: var(--excel-green);
        }

        .no-result {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">Mode Gelap</button>

    <div class="header-section">
        <!-- Gantilah 'logo.jpg' dengan nama file logo anda -->
        <img src="logo.jpg" alt="Pointcore Logo" class="logo-img" onerror="this.style.display='none'">
        <h1>Excel Shortcut</h1>
        <p style="color: var(--text-secondary); font-size: 14px; margin-top: 0;">Produktivitas Lebih Cepat dengan Shortcut Keyboard</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="Ketik shortcut atau kegunaan... (misal: 'Copy')" oninput="handleSearch()">
    </div>

    <table id="shortcutTable">
        <thead>
            <tr>
                <th width="35%">Kombinasi Tombol</th>
                <th width="65%">Fungsi Utama</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data akan diisi via JS -->
        </tbody>
    </table>

    <div id="noData" class="no-result">Shortcut tidak ditemukan...</div>

    <footer>
        program by <b>Albani</b> | <b>Pointcore.id</b>
    </footer>
</div>

<script>
    // DATA LENGKAP
    const masterData = [
    // Clipboard & Editing
    ["Ctrl + C", "Menyalin data (Copy)"],
    ["Ctrl + X", "Memotong data (Cut)"],
    ["Ctrl + V", "Menempelkan data (Paste)"],
    ["Ctrl + Z", "Membatalkan perintah terakhir (Undo)"],
    ["Ctrl + Y", "Mengulangi perintah terakhir (Redo)"],
    ["Ctrl + S", "Menyimpan file (Save)"],
    ["Ctrl + A", "Memilih semua data"],
    ["Ctrl + P", "Mencetak file (Print)"],
    ["Ctrl + F", "Mencari data (Find)"],
    ["Ctrl + H", "Mengganti data (Replace)"],

    // Navigasi
    ["Ctrl + Arrow", "Berpindah ke ujung area data"],
    ["Ctrl + Shift + Arrow", "Memblok hingga ujung area data"],
    ["Ctrl + Home", "Berpindah ke sel A1"],
    ["Ctrl + End", "Berpindah ke sel terakhir yang digunakan"],
    ["Ctrl + Page Up", "Pindah ke sheet sebelumnya"],
    ["Ctrl + Page Down", "Pindah ke sheet berikutnya"],

    // Seleksi & Manipulasi
    ["Ctrl + Space", "Memilih seluruh kolom"],
    ["Shift + Space", "Memilih seluruh baris"],
    ["Ctrl + +", "Menambahkan baris/kolom baru"],
    ["Ctrl + -", "Menghapus baris/kolom"],
    ["Ctrl + D", "Menyalin ke bawah (Fill Down)"],
    ["Ctrl + R", "Menyalin ke kanan (Fill Right)"],
    ["Ctrl + Enter", "Mengisi beberapa sel dengan nilai yang sama"],

    // Formatting
    ["Ctrl + B", "Menebalkan teks (Bold)"],
    ["Ctrl + I", "Memiringkan teks (Italic)"],
    ["Ctrl + U", "Memberi garis bawah (Underline)"],
    ["Ctrl + 1", "Membuka menu Format Cells"],
    ["Ctrl + Shift + $", "Format mata uang"],
    ["Ctrl + Shift + %", "Format persen"],
    ["Ctrl + Shift + #", "Format tanggal"],
    ["Ctrl + Shift + ~", "Format umum (General)"],

    // Rumus & Perhitungan
    ["Alt + =", "Menjumlahkan otomatis (AutoSum)"],
    ["F2", "Mengedit isi sel aktif"],
    ["F4", "Mengunci rumus / Referensi absolut ($)"],
    ["Ctrl + `", "Menampilkan atau menyembunyikan rumus"],
    ["Ctrl + Shift + Enter", "Membuat rumus array (Excel versi lama)"],

    // Tabel & Analisis Data
    ["Ctrl + T", "Mengubah rentang data menjadi Tabel"],
    ["Alt + N + V", "Membuat Pivot Table"],
    ["Alt + A + M", "Menghapus data duplikat"],
    ["Alt + D + F + F", "Mengaktifkan Filter"],

    // Sheet
    ["Shift + F11", "Menambahkan sheet baru"],
    ["Alt + H + O + R", "Mengganti nama sheet"]
    ];

    // FUNGSI RENDER TABEL
    function renderTable(data, limit = false) {
        const body = document.getElementById("tableBody");
        const noData = document.getElementById("noData");
        const table = document.getElementById("shortcutTable");
        
        body.innerHTML = "";
        
        // Jika limit true (saat awal), ambil 6 baris saja
        const displayList = limit ? data.slice(0, 6) : data;

        if (displayList.length === 0) {
            noData.style.display = "block";
            table.style.display = "none";
            return;
        }

        noData.style.display = "none";
        table.style.display = "table";

        displayList.forEach(item => {
            const row = `<tr>
                <td><span class="shortcut-badge">${item[0]}</span></td>
                <td>${item[1]}</td>
            </tr>`;
            body.innerHTML += row;
        });
    }

    // FUNGSI PENCARIAN
    function handleSearch() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        
        if (query === "") {
            // Jika kosong, balikkan ke tampilan awal (hanya 6 baris)
            renderTable(masterData, true);
        } else {
            // Jika mencari, tampilkan semua yang cocok (tanpa limit)
            const filtered = masterData.filter(item => 
                item[0].toLowerCase().includes(query) || 
                item[1].toLowerCase().includes(query)
            );
            renderTable(filtered, false);
        }
    }

    // FUNGSI DARK MODE
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById("themeBtn");
        if (body.getAttribute("data-theme") === "light") {
            body.setAttribute("data-theme", "dark");
            btn.innerText = "Mode Terang";
        } else {
            body.setAttribute("data-theme", "light");
            btn.innerText = "Mode Gelap";
        }
    }

    // LOAD PERTAMA KALI
    renderTable(masterData, true);
</script>

</body>
</html>
